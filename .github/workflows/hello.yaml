name: My Third Workflow

on: push

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: list file
        run: ls

      - name: node version
        run: node -v

      - name: install dependencies
        run: npm i

      - name: starting test
        run: npm run test

  lint-build:
    needs: say-hello
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install dependencies
        run: npm ci

      - name: run lint (direct path fix)
        run: ./node_modules/.bin/eslint .

      - name: build project
        run: npm run build

  deploy-app:
    needs: say-hello   
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: install dependencies
      run: npm i

    - name: start server
      run: node server.js

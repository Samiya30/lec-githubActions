name: PR Workflow

on:
  pull_request:
    branches: [ main ]

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello from Pull Request!"

  say-bye:
    needs: say-hello
    runs-on: ubuntu-latest

    steps:
      - name: Print goodbye
        run: echo "Goodbye from PR!"